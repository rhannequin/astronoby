name: Ruby

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read

env:
  COVERAGE: true

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - 3.2.0
          - 3.2.1
          - 3.2.2
          - 3.2.3
          - 3.2.4
          - 3.2.5
          - 3.2.6
          - 3.2.7
          - 3.2.8
          - 3.2.9
          - 3.2.10
          - 3.2.11
          - 3.3.0
          - 3.3.1
          - 3.3.2
          - 3.3.3
          - 3.3.4
          - 3.3.5
          - 3.3.6
          - 3.3.7
          - 3.3.8
          - 3.3.9
          - 3.3.10
          - 3.3.11
          - 3.4.0
          - 3.4.1
          - 3.4.2
          - 3.4.3
          - 3.4.4
          - 3.4.5
          - 3.4.6
          - 3.4.7
          - 3.4.8
          - 3.4.9
          - 4.0.0
          - 4.0.1
          - 4.0.2
          - 4.0.3
          - 4.0.4
          - 4.0.5
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: Set up Ruby version
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
      - name: Install bundler
        run: gem install bundler
      - name: Install gems
        run: bundle install
      - name: Run tests
        run: bundle exec rake
      - name: Check code guidelines
        run: bundle exec standardrb
